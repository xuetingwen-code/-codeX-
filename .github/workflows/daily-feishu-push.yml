name: Daily Feishu Push

on:
  schedule:
    # 11:00 in Asia/Shanghai is 03:00 UTC.
    - cron: "0 3 * * *"
    # 14:00 in Asia/Shanghai is 06:00 UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      reports:
        description: Reports to send
        required: true
        default: all
        type: choice
        options:
          - all
          - figma-jira
          - taptap

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Select reports for this run
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.reports }}" in
              figma-jira) echo "REPORTS=figma,jira" >> "$GITHUB_ENV" ;;
              taptap) echo "REPORTS=taptap" >> "$GITHUB_ENV" ;;
              *) echo "REPORTS=all" >> "$GITHUB_ENV" ;;
            esac
          elif [[ "${{ github.event.schedule }}" == "0 3 * * *" ]]; then
            echo "REPORTS=figma,jira" >> "$GITHUB_ENV"
          else
            echo "REPORTS=taptap" >> "$GITHUB_ENV"
          fi

      - name: Send daily Feishu pushes
        env:
          FEISHU_TAPTAP_WEBHOOK: ${{ secrets.FEISHU_TAPTAP_WEBHOOK }}
          FEISHU_TAPTAP_SECRET: ${{ secrets.FEISHU_TAPTAP_SECRET }}
          FEISHU_FIGMA_WEBHOOK: ${{ secrets.FEISHU_FIGMA_WEBHOOK }}
          FEISHU_FIGMA_SECRET: ${{ secrets.FEISHU_FIGMA_SECRET }}
          FEISHU_JIRA_WEBHOOK: ${{ secrets.FEISHU_JIRA_WEBHOOK }}
          FEISHU_JIRA_SECRET: ${{ secrets.FEISHU_JIRA_SECRET }}
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: python scripts/daily_feishu_push.py
